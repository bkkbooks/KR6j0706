body:
  text: 這一題中但收本經五名之三却略了二名即此三名又刪了二十二字編輯煥然成一美題不違本義又稱時宜五章洞明四辨具足詳玩題中義理則全經大旨思過半矣本經五名見第八經中今按當題三名而解大佛頂三字是彼初名第八經云此經名為大佛頂悉怛多般怛囉無上寶印十方如來清淨海眼今題中但取大佛頂三字却刪去十八字良由此三字是大定本體餘字是定體上義理故刪義以存其體如來下是彼第三名全收不刪諸菩薩下是彼第五名却刪去灌頂章句四字此經源是灌頂部中流出要義在諸菩薩萬行中故刪繁而取要也彼第二名只是起教因緣彼第四名中所明義理今大佛頂及如來密因中可攝標題此三宗本已立餘可攝故此是集經之人善巧聯布合聚成文若通收五名為題則義理重繁不雅觀故今順本題直解而已大佛頂者即首楞正定之都名也第一經云有三摩提名大佛頂梵語三摩提又稱三昧譯云正定此是極果中正定原夫首楞一定具含奢摩他等三義修奢等三方證此定故首標於此令人觀名而知體也何謂大大者順正定果體得名窮三際遍十方無始無終非內非外超有無有過量非量本體自大非對小而説大無與等故稱為大古人有以大字作實法解愚謂不然蓋大者但顯法體之量具如此大耳又此大字如周易云大哉乾元萬物資始那大哉字是讚辭乾元是實法萬物資始是顯其義耳今題大字亦是讚辭佛頂二字是實法餘二名皆其義耳古人以佛頂作喻解者極失經旨又起信論大具體相用三義與今大字義同大義難思非言可盡也何謂佛頂梵語佛譯云覺此覺即下經所稱性覺性覺即是人人本具靈覺之性此靈覺之性湛然不動故云正定寂而常照照而常寂寂照不二故云性覺而此性覺雖一彼證者有相似分滿之不同今經所顯是圓滿究竟無上果覺故稱佛頂頂是滿義最上之稱然此不離吾心而稱佛頂佛頂即吾心之滿覺故下文標云常住真心是也是知心外無經全經即心非心外別有所説以上約性覺本理解大佛頂也性覺即常住真心故又復將大佛頂三字貫下二名讀之謂大佛頂是如來密因修證了義是諸菩薩萬行首楞嚴須知古人立題之意欲明凡聖同源果因一契故標大佛頂三字於二名之上也如來密因修證了義者如來二字望下諸菩薩看應知如來是果人也何謂如來此是約理名人故指證理的聖人名曰如來如是空義來是有義空有不二故連名如來又如是寂義來是照義寂照同時故連名如來要知如來二義吾心本有人人可稱如來由佛已證此理故實受如來之稱而衆生雖具此理未曾親證故不敢承當耳又成實論云乘如實道來成正覺亦是約理名人也何謂密因密因約二義解一約顯露二約祕密顯則第一經云十方如來得成菩提妙奢摩他三摩禪那菩提是果妙奢等三是因密因之密即妙奢之妙密則第七經云十方如來因此呪心得成無上正遍知覺呪心即祕密義亦指呪為因也大卒三世諸佛皆修此顯密二因得證菩提故了義者約能詮説此十軸之文是了義非不了義了是究竟非是權乘不究竟義故此一名中教理行證顯明可別如來是理修證是行是證了義是教詳味了字之意隱然通上教理行證四義謂能詮既了所詮亦了亦由所詮了故能詮得了蓋教是能詮理行證是所詮故諸菩薩萬行首楞嚴者諸字有二意若約下經五十五位説即彼為諸若遠及凡夫則上自等覺下及凡夫但解此理分滿同途總稱諸菩薩也蓋菩薩義寬故是故上説凡聖同源果因一契乃名諸也菩薩字望上如來看應知菩薩是因人也菩薩是略梵語具云菩提薩埵譯云覺有情菩提是覺薩埵是有情有情即是衆生異稱以自覺覺他得名如云以斯道覺斯民之意又覺而未盡故稱覺有情即分覺義也有情是迷覺中猶有迷故萬行者總舉菩薩所修諸行也行有事理淺深有為無為行名雖多不出六度約開合言之如是乃有八萬及無量之稱今約通途説萬行也行者行也依此道而行不息故首楞嚴是梵語涅槃經云首楞義翻一切事畢竟嚴名堅固謂一切事究竟而得堅固名首楞嚴也一切事即是萬行究者明察義竟者了畢義堅固不壞義言明了一切而本乎一心造極一心而圓照一切皆得無壞無雜故名諸菩薩萬行首楞嚴也又詳味首楞嚴意通兩途説一約行説故云萬行首楞嚴二約一心實義邊説謂不悟一心具足萬行則雖行萬行總是權乘事六度淺近可壞非究竟堅固者也若能明悟一心具足萬行則不起寂光而衆善普會故下經云有三摩提名大佛頂首楞嚴王具足萬行為明證矣經者梵語修多羅譯云契經然諸經論雖單題經字而所指皆云契經謂契理契機説名契經古人云契理則合於二諦契機則符彼三根又古以經字訓法訓常良以人天共仰聖賢同導故訓法也亘古亘今不遷不易故訓常也上十九字按當題是所詮義經之一字是能詮文又按天台以五重玄義釋題則今經準當題以人法為名常住真心為體正定因果為宗破妄顯真為用生酥為教相解題竟唐天竺三藏法師般剌密諦譯唐是震旦國號天竺乃西域都名此經來自中宗神龍元年五月二十三日中天竺般剌三藏於廣州制止道場譯出標時所屬故稱唐也天竺者西域記云天竺之稱異議紏紛舊説身篤或云賢豆今從正音宜稱印度梵語印度譯云月月有多名此其一也良以其土聖賢繼軌導凡御物如月照臨因名印度今稱天竺訛也言三藏法師者三藏即經律論也此師善解三藏法故即以是法教人自行化他故稱三藏法師般剌密諦是譯師名譯云極量又云到彼岸譯者周禮云掌四方之語通稱為譯禮記又云東方曰寄南方曰象西方曰狄鞮北方曰譯四皆官名也今以西稱譯者其時西方闕官北官主之故寄稱譯也後仍舊故烏萇國三藏法師彌伽釋迦譯語烏萇奘師譯云苑是阿輸迦王苑囿也屬北天竺境彌伽釋迦譯云能降伏譯語者按宋僧傳載譯場職銜有六一宗譯主二筆受三譯語四證梵本五證禪義六潤文是重譯其語故稱譯語唐中書門下平章事清河房融筆受中書門下唐二省名平章者謂平和章明國家之政清河漢郡名即今山東東昌府恩縣是也筆受者謂以此方文體筆受其譯而潤色之故曰筆受明古杭雲棲寺後學沙門廣莫直解雲間優婆塞陳繼儒校如是我聞一時佛在至千二百五十人俱這一節經集者承佛遺命而置六成就語也昔佛臨涅槃時阿難戀慕悲感憂苦迷悶阿那律陀為阿難言佛將涅槃汝受付囑傳集法藏今當問以後事勿染愛纏負斯勝託阿難答云某為憂苦所昧無能措辭阿那律陀因教以四事為問其第四問云佛涅槃後凡集衆經經首用何等語佛答云經首當置如是我聞等云云故一切經首皆置此語初如是者指法之辭我者阿難自稱聖人無我順世語便故稱為我蓋言如此經法我從佛聞簡非臆説故茲解稱直故諸玄義不録幸無誚焉一時者不定之辭如今人説一且一時之類良以人間天上時分延促不同如人間五十年四王天一晝夜四天五十年忉利天一晝夜自下而上乃至四禪四空天愈高時愈長佛所説經流通上下不可定其時日故泛言一時耳佛指釋迦牟尼佛也佛字從略具云佛陀譯云覺者若單言佛是所覺義加陀字是能覺人今乃指人稱佛也室羅筏是城名一國之都城也譯云豐德或云聞物具四德故謂饒財欲境多聞解脫道德名稱五天共聞故云豐德及聞物也祗洹精舍是佛説經處也祗洹名義集譯云戰勝國太子之名也以初生時父王波斯匿戰勝外國因立美名西域記又云逝多譯云勝林蓋前以戰顯勝後以林顯勝總是大子之名長水疏訓洹為林用西域記意則洹與林華梵溷而不明今直作太子名解殊似穩當精舍者謂精修之舍也大比丘衆者聽法之衆也梵語比丘譯有三義一破惡二怖魔三乞士大論釋云比謂破丘謂煩惱能破煩惱惡故又比謂怖丘謂魔以道行能怖魔故又比謂乞丘謂士能乞淨命食以養身故僧之美稱也古例多含不翻仍存梵名大者凡受具戒得稱大僧衆者類也千二百五十人者舉常隨之數也佛初成道先度陳如等五比丘次度迦葉兄弟三人兼徒一千次度舍利弗目犍連二人各兼徒一百次度耶舍等五十人今闕五人但舉大數耳此諸比丘皆先從外道修行一無所證才遇世尊便證二果感佛恩深常隨佛化因稱常隨衆也俱者師資授受和合共住為俱從如是我聞至此肇師稱為六種成就教乃得興謂信聞時處主衆是也皆是無漏大阿羅漢至拔濟未來越諸塵纍這一節經集家承前以歎內祕實德外現權儀也皆是下一句是總歎所證果位明權儀也佛子下是別歎明實德也漏是滲漏約喻説如器若漏不堪用故今諸比丘是皆不漏道器故稱無漏漏有三種謂欲漏有漏無明漏詳出法界次第初門中阿羅漢是第四果人名含三義一殺賊二應供三不生對上比丘三義蓋比丘修因羅漢證果故大論謂阿羅名賊漢名殺一切煩惱賊殺故一切漏盡應受人天供養故又阿名不羅名生後世中更不生故結使永斷人天共仰故稱為大佛子下二句上句是天竺文法故倒説也回其文應云住持佛子為順佛子是菩薩通稱意明雖權示羅漢而其內心實住持菩薩位也下句明上句意以能超諸有故住持佛子位也有者著義三界具二十五有略説為三謂欲有色有無色有今能超於有外故稱內實此善超字具二意一若直訓善為能則云能超義淺無味二按勝義解則了有體即中中中流入故稱善超能於下二句承上句意謂雖超諸有亦不離諸國土中往返遊化而諸國土有染有淨有正有倒如華嚴世界品説無量差別則彼國土所有衆生亦有無量差別此諸比丘隨類現形不起滅定而現諸威儀威儀二字其義亦寬律中有三千八萬之説皆能現行有威可畏有儀可則故然又異類中行雜緣內轉隨機適化稱理圓收須知菩薩無一定威儀今現比丘此其一也從佛下二句亦承上説謂已成就威儀堪從佛化轉輪者約喻説即喻説法有轉識成智摧邪軌正之義故如轉輪下句謂非但現世從化抑亦堪囑後事妙者謂雖受遺囑實忘彼我能所之相説法如幻度生同空故稱為妙與善超義同如下經云佛告阿難汝當留願入末法中傳持聖教化諸衆生出生死苦得涅槃即遺囑之事也嚴淨下二句亦承上説嚴是堅固淨是不染毗尼戒之總名也譯云善治以自治淫怒癡亦治衆生惡故下句弘是大範是軌範謂末世行道必自堅持淨戒然後可為三界衆生之師範師範既嚴受化必普故稱為弘應身下二句亦承上説謂既能垂範三界則隨類普應不拘比丘一相也如前威儀中説是則何生不度何縛不解故云度脫拔濟下二句亦承上説悲化無盡窮未來際其苦惱濟彼沉溺下句越是超越塵屬見惑纍屬思惑長水疏云此經在法華後涅槃前説故序歎聲聞非約小行以應身無量度脫衆生等義法華已前無此歎故又云聲聞入實法華已前亦無顯露應知此經法華後説然按今文是歎內祕大行之事與楞伽三種阿羅漢一實二權二權者謂菩薩化化佛化化今義同彼菩薩化也既云菩薩化化寧非入實何得云法華前無此歎耶他經亦有之安得謂無但不細討耳強前歸後殊非正論又此歎德是佛滅後集經之人已聞法華開顯之實故引後分義歎以通從別攝後歸前故作此歎耳其名曰大智舍利弗至優波尼沙陀等而為上首這一節經承前歎德以標千二上首之名也諸經集衆例明三乘此聲聞衆也其名曰者是經家語大智下正列其名不能備舉但例上首數人而已梵語舍利弗譯云鶖子或云身子舍利是鶖鳥名鶖鷺屬弗是子涅槃經云舍利弗母名舍利因母立名故又云此女好形身身之所生故名身子增一阿含經云我佛法中智慧無雙決了諸疑舍利弗第一故稱大智摩訶目犍連者摩訶譯云大目犍連譯云菜蔔根其先好食此故即成姓氏名拘律陀拘律陀是樹名父母禱此樹而生遂以名焉增一云神通第一摩訶俱絺羅譯云大膝論師婆陀羅所生之子膝骨粗大故是舍利弗之母舅也增一云論議第一富樓那彌多羅尼子者富樓那譯云滿願彌多羅譯云慈尼是女聲其父於江邊禱梵天而生父願得滿故稱滿願子母名為慈故又稱滿慈子連父母為名此於如來説法人中最為第一須菩提者譯云善吉其生之日家室忽空父母驚異請師占之占云此是吉相因名善吉以家忽空又名空生增一云解空第一優波尼沙陀者譯云塵性空以觀塵性空而得道故等者等餘比丘也經文尚略等以該之上首者為千二之冠綱領之謂也詳夫此經非智莫入故列名先舍利弗決是非選圓通結經名皆尚乎智故推文殊彼此一意耳復有無量辟支無學并其初心同來佛所這一節經集者承前集衆次列緣覺衆也良以辟支勝前聲聞另為一類是名中乘故云復有梵語具云辟支迦羅譯云緣覺或云獨覺從佛修十二因緣觀其生起還滅得證無生是名緣覺若出無佛世自悟無生名為獨覺又獨覺有二類一則宴處山林樂獨善寂不假徒衆獨善其身者也一則師徒訓化部黨隨行今文乃部行類也稱無學者謂已得果證更無所學故初心者謂初觀生理未深入故即是部黨遇佛回向者也名分緣獨所證是一故列為一也以其不常隨佛因時暫往故云同來佛所長水疏云自此以上判為通序若按諸經列衆具有三乘今止二乘闕菩薩衆若據後文恆沙菩薩來聚道場文殊師利而為上首似成通序中所列菩薩之衆上首字與前聲聞上首相應則當連在緣起序後此必經文倒置譯場之誤也下文休夏自恣別為今經緣起古又稱別序對前通故凡一切經各有緣起如金剛乞食法華放光今經以自恣誤墮各從其緣而發起故屬諸比丘休夏自恣至欽奉慈嚴將求密義這一節經集家承前通序之後以明此經之緣起也屬者會也遇也諸比丘者即所集聲聞衆也又指凡受具戒者而言休是解解夏者佛制比丘夏坐安居從四月十六日起至七月十五日止諸比丘各擇淨處或五人或十人結制安居三月無由覲佛至七月十五解制方趨佛所此三月安居諸比丘各於心中或有得失向佛咨請決疑甄別是非或自有過愆則於僧中向佛懺悔又或自不能覺恣任僧舉懺令清淨故稱自恣自恣律開三日謂七月十四十五十六也十方下明他方因時所集之菩薩長水疏即指結夏諸處為十方則局矣經文明言十方菩薩自恣乃三乘勝會豈無十方雲集之衆必指他方來者為通也咨決心疑者咨是咨請在菩薩邊説決是決擇在佛邊説欽奉慈嚴者欽是欽敬奉是供奉只此欽奉二字具攝身口意三業欽敬則息言屏意拱奉則掬躬瞻仰此為三乘問道之儀也慈嚴者集家顯佛二德也溫陵解云慈以恩言嚴以威言良由世尊有恩可恃有威可畏恩是攝受德威是折伏德也將求密義者按當文説即是咨決心疑之密義也密是妙意能決心疑故稱為妙將者請儀雖具未敢致言故云將求即時如來敷座宴安至迦陵仙音遍十方界這一節經集家明佛酬機順化之意也即時者即彼三乘衆集之時也敷是展意座是坐具謂展坐具而坐也宴安是定佛將説法必先入定佛之常儀也諸會者指三乘八部在家出家同會佛所故言諸會宣示深奧者即所求之密義以深奧故密也世尊順彼所求而宣示之長水疏云如法華先説無量義經為一乘之本今經亦復如是必有經目隱而未見也筵是席謂説法之席也清衆者謂聽法之衆清淨無染也自疑難釋因佛決之前所未聞故稱未曾有以未曾有故稱深奧迦陵是略梵語具云迦陵頻伽鳥名也譯云好音鳥大論云迦陵頻伽鳥在鷇中未出發聲微妙勝於餘鳥如是美音若天若人緊那羅等無能及者唯佛音如之故取譬也仙音者仙是妙意又彼仙人有變化能如佛一音演説衆生隨類各解如仙之化故稱仙音佛音遍十方界則彼鳥聲不如但取其清婉悅意略取況耳遍界之音如目犍連逞其神通極西方恆沙世界聽佛音聲尚如對面餘方亦然故稱遍十方界詳如大論説恆沙菩薩來聚道場文殊師利而為上首這一節經經家明他方雲集之衆如恆沙之多也菩薩雖恆沙之多必以實智冠其首故以文殊為上首也恆沙者恆是天竺河名具云恆伽又云殑伽譯云天堂來源出阿耨達池但明出處高遠實非天上來也此河廣四十里其沙如麵之細佛近此河是故多引為喻也文殊師利譯云妙吉祥又云妙德德即吉祥意前云十方明來處也今云恆沙明其數也文殊表實智於此會中為擇法主故居上首時波斯匿王為其父王至及阿羅漢應諸齋主這一節經集者承次以明自恣法會王臣設供之緣也時者自恣時也波斯匿是室羅筏國王名梵語波斯匿譯云勝軍諱日營齋者長水疏云先王崩日忌諱之辰諱忌也忌舉吉事避其名也吳興解引祭義云忌日必哀稱諱如見親也營是經營修設之意齋是必齋以盤餐之食齋心而供養之故稱為齋宮掖者正宮之側室也如人肘掖故請佛宮掖而云自迎者國王至尊不委臣下而自迎之敬之至也珍是貴重意古有八珍之饌以烹炮膾炙為世所尚周禮云膳夫掌王者之羞方言曰羞熟食也無上妙味者謂食美更無可上美之至也大率天竺以醍醐為上味故王之請佛必兼菩薩皆親延也又室羅城中長者居士尊姓之家欽仰自恣意謂功必倍於尋常是故同時飯僧也佇者翹足而望也佛為世間大慈悲父人皆佇望佛應其供佛敬其王必應王請因勑文殊分領三乘之衆應諸齋主勑者上命其下也以十德具足説名長者以清淨自守説名居士唯有阿難先受別請至途中獨歸其日無供這一節經集者將明阿難誤墮之緣也次第漸明先受別請歸途無供以為誤墮初起情實昭著心目敘事有法可為善筆也梵語阿難大論譯云歡喜斛飯王之子佛之從弟也佛成道日生其父遣使報淨飯王云貴弟生男王心歡喜乃云今日大吉佛今成道弟又生男與來使言傳語此兒當名阿難舉國欣慶又云慶喜年二十歲佛度令出家增一云多聞第一別請者謂別有事緣而請不同衆故蓋別請在自恣之先而阿難本有不受別請之願故知此請必非齋施又此別請且遠未還故自恣時不遑僧次也遑暇也不暇於僧次第中故律明比丘遠遊兼人及己軌正必三一上座二阿闍黎及自為三也上座者謂臘高德邁足為我師者名曰上座阿闍黎譯云軌範師以能紏正弟子行故名軌範也今阿難偶值他緣事必倉卒故無二師途中獨歸無供之語正為生起下文乞食誤墮之由也即時阿難執持應器至圓成一切衆生無量功德這一節經集者仍次以明阿難現行乞食之立心也觀夫阿難所發之心正是耻小慕大宛然方等法相人何不識別為穿鑿支離前後教眼何在此節是當機發行之始創教之緣學者研明於此則知定屬方等無疑矣即時者無供之時也應器是鉢梵語鉢多羅譯云應量器發軫云應法之器也謂體色量三皆須應法故稱應器阿難持鉢於所經遊城中次第循乞次第即不擇貴賤尊卑貧富淨穢之意循即隨緣之意蓋其行乞之心初慕平等而耻不均故欲乞彼未曾行施之人向福田植因以其行施最後故稱最後檀越檀越者名義集云檀是檀那譯云布施越是施之福報謂超越貧窮海故然彼最後行施之人慳惜難化阿難耻小慕大難行能行故求此輩以為齋主無問下正明平等行乞之相淨穢二字是總稱剎利下是別顯剎利尊姓之家是淨旃陀羅淫酒屠殺之類是穢剎利具云剎帝利譯云王族天竺有四尊姓一婆羅門二剎帝利三毗舍四首陀四皆自計從梵天生故今文但舉其一影帶餘三旃陀羅譯云嚴幟以惡幟自嚴故法顯傳云旃陀羅名為惡人與人別居入城市則擊竹自異人見而避之若不爾者王必加罪如此方勸善徵惡之意也方行等慈者方是方法法佛平等行慈之意不擇正是平等微賤對上尊姓字謂不擇貴賤而行乞也下句出上意云阿難發意圓成一切衆生無量功德故一切衆生即指上貴賤淨穢等也問祗一行施何能即具無量功德答有深意存焉如維摩經云於食等者於法亦等若此平等行施達三輪空稱一實相則一行一切行一行一功德一功德中具足無量功德不亦宜乎今文簡略須知尊字影含卑意賤字影含貴意貴賤中影含貧富意既稱等慈豈簡善惡有緣無緣冤親等耶讀此文者自能默融等意可也阿難已知如來世尊至開闡無遮度諸疑謗這一節經集家述序阿難引佛昔訶不均之事證今平等當行也如來世尊是佛十號之二世尊者謂佛大慈普覆為世所尊以九法界俱稱為世俱稱衆生故須菩提見前解大迦葉者具云摩訶迦葉波譯云大飲光飲光因緣出第五經圓通章簡非三迦葉故加大言良由須菩提乞食捨貧從富以不惱苦衆生故迦葉則捨富從貧以令貧者植施因故二俱好心但由分別故訶不均因緣出維摩經彼經本為居士所訶今經稱如來訶者順時適化寄緣䇿引安知如來不訶耶此正明方等彈偏歎大之意心不均平是彈偏開闡無遮是歎大無遮者謂無遮限也上二尊者俱有遮限故被訶責是以阿難發意開闡平等無遮之心而度彼疑謗之人也經彼城隍徐步郭門嚴整威儀肅恭齋法這一節經集家述明阿難乞食經遊之儀也上二句明所遊之儀下二句明齋法之儀經是經歷隍是城塹郭門即城門也徐步是威儀乞食威儀者謂著衣持鉢安祥徐步不左右顧視得之不喜不得不嗔兼以慈慧鑑機正容悟物此謂乞食威儀也嚴是莊重整是整齋肅是端肅恭是恭謹此謂齋法之威儀也齋法者請觀音疏云齋者齊也齊身口業故又齋者秪是中道日中食也中後不得食者表中道法界外更無別法中前得食者謂雖非中道以表中道之前方便相似中道乃有證義故得食也此謂受齋之法今阿難肅恭此法而行乞也爾時阿難因乞食次至淫躬撫摩將毀戒體這一節經集者承前不擇之意此正明誤墮之緣也爾時者次第乞食之時也由不擇故經歷淫室遭遇也大幻術者以梵天所傳故大本是惡邪誑惑變幻之術故稱幻術術法也秪一惡呪耳下文云惡呪消滅是也詳此術意不但攝淫而已凡諸軍陳劫殺之事多可為之故稱大幻術也摩登伽長水疏云義翻本性引下經性比丘尼為證故翻性也性是淫習之性非真性也娑毗迦羅譯云黃頭仙人之名此仙得彼先世梵天所傳之呪轉教摩登伽女登伽乃以此呪攝持阿難入乎淫室言淫席者謂室中陳列皆是淫具凡諸美觀能動淫心故稱淫席淫躬撫摩者淫躬指登伽説舉措多是淫態故稱淫躬撫摩者謂登伽逼近阿難撫觸捫摩將毀阿難之戒體也戒體對上淫躬看尊者受具足戒諸戒依身而持故稱戒體支戒雖昏根本不動正在窘迫故稱將毀下經云心清淨故尚未淪溺可證也如來知彼淫術所加至俱來隨佛願聞法要這一節經集家述敘如來往護之慈以開楞嚴之蹊徑也如來在室羅王宮阿難在所遊誤墮不知隔越幾許途程佛眼能見佛智能知今以知影見也蓋登伽動身發語運心三業惡露盡在如來知見之中無不明了是故齋畢旋歸旋歸者歸之促也如來受齋常儀齋畢説法從容而歸今日旋歸諸王臣輩疑必有由是故俱來隨佛願聞法要法要者大法之要領也于時世尊頂放百寶至結加趺坐宣説神呪這一節經集家述明世尊歸園説呪往護之慈軌也于時者世尊歸而敷座衆集之時也佛將宣呪先放頂光具百寶色言無畏者謂百寶色光能破一切幽暗惡邪逢之悉消殞故能使一切畏而不畏一切故稱無畏百寶光者光明是光之體百寶色是光之相蓮華現佛是光之用這體相用總出於大佛頂常住心中是故光從頂出光現蓮華華嚴化佛此即宣呪之慈軌也詳夫法不孤起意託象明本佛示默而化佛説者意表法佛本然無説無示以無相現相無説示説一真湛寂萬化冥通如幻智力不動斯周一經大旨意見於此勑文殊師利將呪往護至及摩登伽歸來佛所這一節經集家述明往護勸歸以結緣序之益也緣起序分止此勑者上以命下之言將是持意呪由化佛言宣勑乃本佛使命但以口授原無文字持則文殊心持往護阿難真呪一至幻呪遂銷真能破幻善能除惡提是提文殊向愛欲坑中提阿難獎是獎勸登伽不遂欲心羞慚惶怖文殊以善言獎諭方便制伏其惡心權宜䇿發其善念登伽且仗神呪威力冥資其益即得果證故能同歸佛所下經云彼尚淫女無心修行神力冥資速證無學是也下起正宗分阿難見佛頂禮悲泣至三摩禪那最初方便這一節經正明阿難出愛欲坑到無為岸責躬歸咎於多聞因請無漏道定之義也阿難下六句猶是集家語十方下方是阿難當機發問之言從前如是我聞至此皆是集者之辭此下才起師資問答機教相扣成山初簣自此發軔學者應知阿難也大奇何故一見佛便自歸咎多聞識得自己受病的根源開口便請妙奢摩他等然則多聞是病妙定為藥一經之破顯唯在此耳詳玩此經大意蓋在抑慧揚定使行人均而不偏也大抵行人偏於慧則狂偏於定則癡不狂不癡要在定慧均修耳是故此經緣起由阿難偏於多聞多聞屬慧故定力不足遭斯邪染且説從無始來則非一生兩生所積多聞法華亦云阿難憶持過去無量百千萬億諸佛法藏故今云無始也下經佛責云汝雖歷劫憶持如來祕密妙嚴不如一日修無漏業即抑揚之意耳然亦多聞之病從耳根起下選耳根圓通為阿難最初方便良有以也蓋以循聲流轉而成其病下則使之旋倒聞機以復其湛藥病相因昭如日星諒無議矣然又多聞之病不獨阿難此娑婆世界衆生皆墮此病故曰此方真教體清淨在音聞今阿難畜聞成過因請道定之藥以治之也十方下正請道定菩提是道奢摩他等是定道由定成故梵語菩提譯云覺又云道道即覺故此指如來自證無上至極之道而言奢摩他譯云止止者古師訓為制止亦名止息又云心性之理常自不動故名為止止義多途略出三意一體真止謂體達無明顛倒之妄即是實相之真故名體真止二方便隨緣止方便即是善巧曲成之意謂隨緣歷境安心不動故名方便隨緣止三息二邊分別止謂不分別真俗有無等二邊不分別即是止息故名息二邊分別止梵語三摩具云三摩鉢提譯云觀觀是照了之意謂照了一念心中即具三觀之義觀中亦自有三意一空觀空者蕩相之意謂觀現前一念之心不在內外中間三處畢竟無心可得故名為空由觀一念空故一空一切空無假無中無不空三相皆蕩是畢竟空故名空觀二假觀假者指有邊説雖有非真非真即是假有謂觀現前一念之心具足三千性相故名為假由觀一念假故一假一切假無空無中無不假三相皆立即為妙假故名假觀三中觀中即中正絶二邊對待之意謂觀現前一念之心非空非假即空即假非即不二故名為中由觀一念中故一中一切中無空無假無不中三相絶待是為圓中故名中觀梵語禪那譯云靜慮靜即是止慮即是觀止與觀不一不異非同非別故聯名靜慮圓融具是平等住持是謂禪那之實相也或問上二義各具三意今禪那中不言具三何也答涅槃疏云禪那亦云等持蓋禪那無別有體即等持上二不令偏倚即禪那義也故不復言三夫此奢摩等三者舉一即三言三體一非一非三能三能一即現前一念心中具足如斯妙義故稱為妙即這妙字貫下二名謂妙奢摩他妙三摩妙禪那三義皆妙是圓融三觀非隔別義故或問三止三觀圓義可知然於此經的指何者為所觀境耶答曰下文佛徵發心見相即以心見二義為所觀境今云現前一念即境故雖稱妄境本具三諦義故能觀所觀二俱不離一心故如止觀中説今文甚略當以圓心會之非言可盡也然此三義是今經心法緊要妙旨故詳解於此讀者毋厭其繁可也然此三義乃成佛必由此得如云出必由戶三藏十二部凡一切經論無不發明此三觀之妙是喫緊心法然今上文諸佛所成菩提是果妙奢等三是因修此因方證得菩提果體是以題中稱密因者此也然又菩提果體即是首楞妙定而妙定即是常住真心一法千名應緣立號耳下經二十五圓通是酬最初方便之請蓋此最初方便又是入妙奢等之初心方便也然知二十五圓通總名最初方便由此方耳根利故特選耳根圓通以逗此方之機以應多聞之病也又此阿難一問意含理行證三要妙奢等三是理最初方便是行既有所行必有所證影顯於行中耳一經玄旨並出於此約答意次第且標此節為理門初要於時復有恆沙菩薩至退坐默然承受聖旨這一節經集家述諸所集之衆樂聞此請默坐息心待受聖旨也言退坐者阿難問畢自應接足致禮衆從請主起禮禮畢退歸本座而坐故云退坐默然是息心定之意也前文齋畢旋歸有諸王臣今此不舉略也佛告阿難汝我同氣至頓捨世間深重恩愛這一節經世尊將酬所請且從其發心見相處徵詰其妄也發露他受病根由以為破顯本據阿難是斛飯王子佛之堂弟其祖一脈故云同氣父母為天倫是倫匹儒稱兄弟為天倫也父母妻子為世間深重恩愛然今詰其發心見相者要審他真妄虗實果與奢摩等相應若是生滅則不相應因心既與奢摩等不相應如投越而北轅愈趣愈遠徒自疲勞故佛詰其因心者有深意在下經云若以生滅為本修因欲求佛乘不生不滅無有是處可證也又此心見二字向下徵心辨見等文皆從此起阿難白佛我見如來至是以渴仰從佛剃落這一節經阿難答上詰意實陳心見之始以明發語之由也然觀阿難發心見相宛然心境彼我崢嶸角立得非生滅心乎病根在此可知矣如來三十二相者始自足下安平終至頂髻高圓詳出法界次第初門良由如來以戒定慧熏修積劫百福所種故感勝妙殊絶清淨無垢內外明徹喻如琉璃琉璃是梵語具云吠琉璃譯云不遠寶波羅奈城不遠有山出此寶故阿難尋常自思如來之相非從欲愛所生何以下徵釋上意謂彼欲氣粗濁安有勝妙腥臊臭腐安有殊絶實從男女交遘不淨所生一切肢分膿血雜亂不能發生勝淨明妙紫金光聚紫金光者謂如來色身如紫磨金光明團聚一切無能及者是以阿難頓希此相從佛剃落佛言善哉阿難汝等當知至此想不真故有輪轉這一節經世尊將破心見之妄且先標真體以立其本也善哉字隨經義當是世尊憐愍之辭憐其迷於妄想失却真體故也佛指一切衆生説者謂舉世皆迷不獨阿難因阿難一人而該乎衆也然又迷來遠矣從無始來今生死相續者皆由不知常住心體此常住心體即是人人本有靈覺之性從本以來寂然不動故稱常住真心對下妄想看而此真心性本明淨虗妙融攝人自不知不知即是迷迷即是無明晦此本明而用諸妄想蓋妄想易見昭昭靈靈在我視聽言動之間故人皆用此以為自心而不知是妄想非真心也真心本自寂然無迹可窺故迷而不知乃認此昭昭靈靈為我受用只這用字即是日用之用以日用之間所應接者人皆誤認為真而佛直斥為妄妄故有生滅生滅即為輪轉妄則非真輪轉則非常住迷此真常得非大哀乎是故佛稱善哉而告之以立其本也汝今欲研無上菩提至中間永無諸委曲相這一節經世尊將破心見之妄以酬菩提妙奢之請又且誡以直心酬答也無上菩提者是牒阿難問中十方如來所證得者研是窮研真發明性者詳玩文意要從無上菩提一氣讀下發明二字是菩提真體中所發顯的性何者是菩提中所發的性正指妙奢摩他等是也此三義者理本所具即是菩提體上所發妙用故也發明即是發顯有人誤作言語發明看者非也須知上句研字就是發明的意思豈有一句中用兩發明語沒有此等文法應當下誡以直心酬問也十方下示用直心的所以然用直心者謂由十方如來出生死者同一道故一道即無上菩提心若不直則欺諸佛矣心言下謂不唯心直言亦須直蓋心為道本心不直則所行之道曲言為心之表示心不直則言邪故須心言皆直從凡而聖自卑而高始信位終等覺中間歷住行向地諸位永無諸委曲相皆由直心故無曲也阿難我今問汝當汝發心至將何所見誰為愛樂這一節經世尊審詳見由何起愛樂者誰以為七徵八辨之張本也確定妄源然後次第徵辨今此心見二字即是前文發心見相之心見以為理門徵辨破顯的把柄學者不可迷其始也阿難白佛言世尊如是愛樂至故我發心願捨生死這一節經阿難酬上所問也上問中見與愛樂分開説今答語先合次開先指心目合一愛樂次以心目分開説謂由目觀見心生愛樂故我下結上發心所以佛告阿難如汝所説至則不能得降伏塵勞這一節經世尊承前答語令知心目是賊須先察其巢然後可以降伏也如汝下牒答語若不下令知其巢佛意謂一切塵勞皆由心目所起以心目為賊者下文當明今欲降伏塵勞必先察知心目潛匿的所在心之所在即下七處是其所依見之所在即下八辨處是也如以七處推窮使其無處依倚先搗其巢賊形既露則計窮而易降伏塵勞自息矣塵是塵緣屬見惑勞是勞慮屬思惑譬如國王為賊所侵至唯心與目今何所在這一節經世尊約喻以明心目必應除者要先知其所在也國王喻前常住真心王法性土故喻國王賊喻心目六為賊媒自劫家寶故喻如賊發兵討除喻奢摩他等觀智討除即上降伏也所在可知使汝下法合流轉對常住説謂真心本來常住真為妄轉賊所侵故即同流轉流轉即前文輪轉故云心目為咎心指第六攀緣心義該前五識目是眼根義該餘五吾今下三句正徵所在阿難白佛言世尊一切世間至如是識心實居身內這一節經阿難答上心目之問指明所依之處也一切世間者指十生之依報世間也十種異生是正報故以感報不同故稱異生依正皆異故十種異生者謂卵胎濕化無足二足四足多足有想無想非有想為十也他經及下本經皆稱十二類今除空散消沉非有心目故但云十也阿難答謂十生之感報雖異而心必在面下目異生上極諸佛心眼的所在皆同異生説心而不及眼如來説眼而不及心文互顯也如來眼色相好光明如青蓮華故稱青蓮華眼我今下例上佛與異生以明阿難自眼亦在面心亦在內也浮根四塵者凡六根皆由能所八法所成根根有浮塵勝義二法有形相可見名浮塵根清淨四大唯天眼可見者名勝義根皆由能造四微所造四大八法所成今言浮根者指眼浮塵根説四塵者指能造四微説故云塵也略其所造四大故但云四能造四微者謂色香味觸所造四大者謂地水火風以不顯故謂微以形量遍故謂大佛告阿難汝今現坐至今祇陀林實在堂外這一節經佛承執內之心以審實內外然後破之意令阿難易悟也前文雙徵心目今且先徵心處心處既破然後破見經文次第學者應知汝今下一句汝指阿難隱然喻在內之心講堂隱然喻阿難之身觀祇陀林今何在者要明自內及外應先見內後見外也下文當明祇陀林者以林樹是祇陀所施故稱祇陀林祇陀即祇洹先後譯不同故世尊下阿難答也重閣者謂重簷飛薨如云阿閣三重階説崇高也閣下即是講堂世塵不到所集者皆精修之士故曰清淨上文佛但問祇陀林今阿難答語承出給孤園給孤是須達長者美稱以樂給施孤獨故稱給孤園是長者布金所買故稱給孤園各標施者之名今問答中互顯二施者之林園也今祇陀林實在堂外二句是正答所問阿難汝今堂中先何所見至如是外望方矚林園這一節經世尊承前自內及外次第審實以定先後之分破之使易悟也何故世尊不直明心不在內乃將內外先後為問者何耶此正要阿難從這內外見處先後會明他的心若在內亦應自內及外若不見內而但見外者明知此心不在內矣佛意欲令自悟故引內外先後次第為問也今佛問云汝身在堂中先見何等內外先後於此當明世尊下阿難答也在堂先見佛者良由佛處衆中身相光明映蔽一切如星中之月故阿難舉目先見佛次見衆也然佛與衆見雖先後總在堂內而先見之如是下次見外也於此明之則知在內之心不成矣阿難汝矚林園因何有見至故我在堂得遠瞻見這一節經世尊徵前由目得見之意重審其見外之因也佛於前文逐節審實皆令阿難自陳使其誵訛易見下文世尊從而破之會事歸心便於悟故此是世尊善巧曲成之意也矚即是視世尊明知阿難執見由眼故問因何有見使其答出後當破之意在見不由眼從心顯見故下文詰云汝在室中門能見否今阿難果答以戶牗開豁得遠瞻見戶牗隱然喻眼開豁而得見也今猶在現事上辨且不明示爾時世尊在大衆中至阿難頂禮伏受慈旨這一節經世尊承前逐節依事審定內外今將破內之心且先標定體以立其本也標本在前向下一示一悟一破一顯俱是首楞定體學者毋迷其宗也舒是舒展佛身金色故稱金色臂摩頂是安慰意佛意今將破執恐生驚怖故預安慰而後告之阿難是當機故首告阿難以及衆也有三摩下示大定名首楞嚴是究竟堅固義詳如題中解王者此三摩提為萬德之本故稱為王具足萬行者大定是常住真心湛然之體此心統具萬德而萬行由之故云具足萬行十方下明佛佛道同以顯大定之玄功也謂十方諸佛莫不從大佛頂三昧一門超出妙莊嚴路妙嚴路者即下經所明五十五位菩提路是也言妙莊嚴者謂大道無作由定慧莊嚴定慧即是奢摩他三摩禪那如法華云定慧力莊嚴是也今下經云大涅槃海為到家之地五十五位為入涅槃之路言妙者謂不嚴而嚴嚴而不嚴如般若云即非莊嚴是名莊嚴方稱為妙又今文所稱三摩提又名三昧是大定之通稱不必引前三義中三摩説此是果定彼屬因故然即指彼説亦無礙一即三三即一故如所謂一乘實相即因即果故又此下所顯奢摩他三摩禪那三義雖圓而其文有兼正如初則正演奢摩而三摩禪那兼之次則正演三摩而奢摩禪那兼之又次則正演禪那而奢摩三摩兼之兼正交徹主伴互融一而不合三而不離文義俱妙不失圓融行布之旨此今經之妙義也有人泥於圓融而難於行布則紊亂其辭三詮靡舉如是則一三三一之道不可得而聞矣學者臨文幸深思之此下正起奢摩他文止第二卷後彼暗與通及諸群塞亦復如是處佛告阿難如汝所言至能見林泉無有是處這一節經世尊躡前所審定之語為問令其自陳訛處也前文阿難答云戶牗開豁得遠瞻見佛躡此二句作破內的把柄亦有下佛捉他的破綻良由阿難在事上陳説最自明白謂先見內後見外也然則其心在內何故不先見內而但見外耶故佛即於事上問云亦有衆生在堂不見內但見外者麼這是世尊引出他的訛處來阿難果謂在內必先見內而後見外故云不見內者無有是處世尊今乃依事顯心下文以心合事破綻自見矣阿難豈不服膺而易悟哉從此是七徵初起先破在內也阿難汝亦如是汝之心靈至住在身內無有是處這一節經世尊第一徵破執心於內之所在也汝亦如是一句正是以心合事之意例上在堂不見如來而見堂外如心在內不見內而但見外意同汝字意指心説故下句承明汝之心靈一切明了靈者謂此心昭昭靈靈故謂心靈明了者以心靈故觸處明白曉了故云一切明了若汝下正徵在內謂此心既在於內爾時亦應先知其內頗猶可也佛謂世間可有人先見身中後觀外物者麼這一句合前亦有衆生在堂不見如來見堂外者以身合堂以心合衆生法喻俱不可則知此心必不在內縱不下是縱辭心肝脾胃的心字指肉團心説謂心肝脾胃密藏於內縱汝不能見那爪生髮長筋轉脈搖却在皮裏膜外汝心在內誠合明了如何亦不知耶此責他心在內而不知內也必不內知者心肝脾胃之內汝必不知那爪髮筋脈雖稱在外亦云何知這兩句是佛的斷辭謂他斷然不能知者則知此心不在內矣是故下結不在內謂汝之覺了能知的心在內不見內故汝執不成無有是處者謂無是理也下皆倣此阿難稽首而白佛言至從其室門後及庭際這一節經阿難因聞破內之音轉計此心居在身外也如是法音者指上破內的法音由被破故悟心不在內復計在外所以下舉喻徵明在外的所以謂何以知心在外耶舉喻云譬如燈光然在室內此燈必能先照室內從那室門照出於外方及庭際此喻自明執內之非正是他的悟解之語悟前非也下文才出計心在外的所以一切衆生不見身中至同佛了義得無妄耶這一節經阿難承前喻説以明在外之心也指一切衆生説者意謂衆生皆能見外而不見內則計此心在外與人同也亦如下重躡燈喻然在室外但能照外不能照室喻心在外亦但見外不能見內也是義下是義者指在外之義謂此在外之義更無疑惑以無惑故昂然自謂同佛了義得無妄耶觀阿難上文矯云心居身外今又云是義必明等辭辨矯強者良以尊者既示同迷故其辭辨固執如此佛告阿難是諸比丘至云何一人能令衆飽這一節經世尊第二徵破執心於外之所在也世尊破法不直就他所執處破別引現事問他令他自陳漏逗隨事分別得易解故比丘義見前解適來下引現事也適是適才循是隨緣之意搏是段有形段可摶故宿齋言預先受齋也佛謂此諸比丘適才從我向室羅筏城隨緣乞食既歸祗林我預受齋汝觀比丘一人得食衆皆飽麼世尊引此事問者正明在外的心如他人相似與我無于如一人食諸人不飽例明身心相隔之意阿難答下不音勿阿難意謂世間沒有一人食諸人得飽的事故云不也這一句是總答何以下徵釋所以謂諸比丘證果雖同軀命各別云何一人食諸人得飽一人例阿難身衆人例阿難在外的心一與衆隔別無于則阿難的身與心亦復如是破文在下佛告阿難若汝覺了至若相知者云何在外這一節經世尊以在外之心隱然例上一食衆不飽責其昧却相知之誤也佛謂你的覺了能知能見之心實在外者則你的身心相外了外是隔意身心自不相干則在外的心之所知身不能覺覺在身際心不能知矣這節雖不顯合一食衆飽之事義意暗契也我今下佛又示手以明身心相知之驗兜羅譯云細香佛手細軟如綿故稱兜羅綿手汝眼下二句是責問之辭責意謂汝若相知誤計在外矣阿難答如是者領解相知也若相下二句世尊責其心非在外是故應知汝言覺了能知之心住在身外無有是處這一節經世尊結上執心在外不成也阿難白佛言世尊至佛言處今何在這一節經阿難因聞破外之非又轉計也如佛下雙述內外之誤文顯可解我今下正復轉計一處見下文佛言下徵其一處阿難言此了知心至彼根隨見隨即分別這一節經阿難因徵陳處設譬妄合非實處也此了知下三句阿難將陳其處先述心的暗內明外之能如我下正陳其處潛根內者根指眼根這一計阿難自欲雙避內外兩過故計潛根夫此心無體何有潛根的道理猶如下設譬以顯潛根見外的所以琉璃見前解以琉璃所成的碗合於兩眼之上琉璃性本明淨內外映徹雖合眼上不為所障留礙是障義琉璃喻眼眼喻於心眼亦明淨如琉璃故以喻心潛眼內眼雖合於心上不為眼所障也彼根下猶有喻説謂彼眼根隨琉璃所映見者眼即隨他分別以喻眼所映色心則隨見隨分別也然彼琉璃合眼眼見琉璃兩眼合心心不見眼隱然徵出法喻不齊之過破在下文然我覺了能知之心至無障礙者潛根內故這一節經阿難重出潛根之意欲逃內外之愆也前文阿難初計潛根已述內外之過矣今重辨內外者蓋前直述內外之過今辨潛根以釋內外見不見的所以以明潛根之計得成故也文顯可解佛告阿難如汝所言至琉璃籠眼實見琉璃這一節經世尊第三徵破潛根所在且先審喻義引出不齊之失也良以琉璃明淨雖籠眼外能見山河琉璃乃眼外之物亦應見之問答可解佛告阿難汝心若同至潛在根內如琉璃合這一節經世尊承上喻義直明法喻不齊潛根之計不成也汝心下合上喻義謂汝心同喻兩眼如琉璃合喻見琉璃心不見眼是故責云何不見眼若見下雙破謂見則眼同前境不得説隨見隨分別矣蓋眼為心所依處切近於心方許云隨若眼同外境則為客義非主非伴故云不得成隨若不見眼則潛根之計不成故責云云也兩隨字一樣看是故應知汝言覺了至如琉璃合無有是處這一節經世尊結上潛根之計不成也阿難白佛言世尊至名為見內是義云何這一節經阿難因聞潛根之破又轉計也此計執心還依身住變前內外別作明暗兩皆能緣為心所依處謂衆生之身腑臟居於內竅穴列於外眼等七處是也穴即是竅以腑臟在內黯然莫辨故云為暗此欲避見內之過也竅穴居外則明而可別故云為明此欲避離身在外之過也然今內外可見心不離身此欲避潛根之過也今我下正會內外明暗為今第四所依之計開眼見明為外見從外流易解且置勿論獨閉眼見暗為內無反觀理所以下文單破內對內對既破外亦從破也是義云何一句詳玩亦有意思學者應知蓋阿難前文執心在外之時云是義必明將無所惑同佛了義得無妄耶看他言語何等剛強這是阿難初逢辨義其心尚粗今所計語不敢自是但問云何看他言語何等調柔這是阿難心漸細處向後一往入微愈趣愈妙也佛告阿難汝當閉眼至若不對者云何成見這一節經世尊第四徵破內外明暗心所依也文中阿難雙計內外世尊破法單約內暗破者意顯阿難雖計內外明暗而其所執之心還成在內是故世尊單約內暗破也汝當下牒上所計內暗此暗下標二意破之若與下先破對眼文可解若不下次破不對眼凡明暗境界要與眼對方名為見既不對眼云何成見若離外見內對所成至即汝一身應成兩佛這一節經世尊正破閉眼內對之暗而委明內對不成也前文阿難計謂閉眼見暗名為身中這一計自含眼前內對兩意眼前一意上文已破今正破內對初文云離外見者謂離眼前之暗也內對所成者內對謂閉眼返觀向內所對之暗也合眼下四句佛以開眼例破內對謂你合眼內對所見之暗名身中者若合眼能內對開眼亦可內對又合眼內對若見身中開眼內對何不見面若不下二句正破內對不成謂開眼內對若不見面則你合眼內對而見身中亦不成矣見面若成下世尊恐其轉計故委悉詳明必無內對之理你若計開眼內對能見面者則此了知之心及與眼根乃在虗空例如心與眼在那邊才能見得這邊的面既在虗空何成在內則你內對見暗名身中者不成矣又若眼根在於虗空自非汝體就似他人所有二般故云即應如來今見汝面若你的眼根在他人身上則他人之身是汝之身矣又汝眼在外則眼所知者你身合非覺然今必汝執言身與眼兩相知覺若身眼俱覺應有二知眼即汝身則你一身有二知應成兩佛矣如此委曲詳辨畢竟沒有返觀內對的道理是故應知汝言見暗名見內者無有是處這一節經世尊結上閉眼見暗名身中者不成矣阿難言我常聞佛開示四衆至亦非內外中間三處這一節經阿難因聞內對之破又轉計也前來所徵四處皆是阿難依自見解而立今乃引佛昔言為他轉計之本故云我常聞佛云云也心生法生法生心生者蓋心與法相因而生也心是第六攀緣心法是六塵由第六識心攀緣外境境隨心起此為心生故法生也又外六塵擊發內六識此為法生故心生也故云由心由法言種種者謂心與法各有無量名相故也我今下正出其計上思惟字是第六現行意識良以第六識思量勝故今思惟即是思量大約六七二識雖依主持業不同俱託思量起故今阿難認思惟體為自心性則以第六攀緣心為心也隨所合處下出心所依處謂心無定所遇合即顯合者心與法合也不定一處故云隨合以隨合故不拘內外中間三處又下文佛的破意且不破他的心但破其合處前後七處徵破但破心依的所在前文云是兵要當知賊所在讀者勿忘其源也佛告阿難汝今説言至若從外來先合見面這一節經世尊第五徵破隨合之處也佛告下牒領其計是心下正破合者以二物函蓋乃名為合然要有體可合若無體則無相如何可合故云無體則無合也這兩句是正破若無下防轉計也佛防阿難轉計謂心雖無體亦能合也故此承上無體防云若無有體而能合者則十九界與七塵合界是能合塵是所合能所皆空名無物可合世間秪有十八界與六塵十九與七徒空名耳以空合空空不可合故云是義不然若有下又承無體轉破有體挃陟栗切音只觸也挃就是合文可解阿難言見是其眼心知非眼至若見物者云何名死這一節經阿難聞上見面之語因疑心知眼見而責心見者非當理也阿難云見是眼之功知乃心之德心本非眼云何世尊以見責心耶佛言下世尊會見歸心謂眼是血肉所成面上兩竅如門戶相似心為一心之主見由主人主人若去門戶安能見哉故云汝在室中門能見否汝是主人門是室門汝喻心室喻身門喻眼則諸下五句可解阿難又汝覺了能知之心至為復遍體為不遍體這一節經世尊重破有體詳明隨合之非真也上文但破有體的合義今文正破有體佛約四意破之此總標下別破今文四體字上二指心體説今在下二體指身體説上心體以一多論下身體以遍不遍論在文可知若一體者則汝以手至足應無知今汝不然這一節經世尊承標別破心之有體四處俱非也若一下佛謂此心若一體者則周遍汝身如傷一支四支皆痛方名一體若四支咸覺則挃應無定謂無受挃的所在若挃有定所有知不知處則汝之心一體不成矣若多下次破多體佛謂一人秖一覺性此心若有多體則成多人多人則各各有身何體為汝今汝必無多體則此心多體亦不成矣若遍下三破心遍身體同前所挃者同一體破也謂心遍汝體則無處不遍觸頭觸足應互覺知若頭足有知不知處則非遍矣若不下四破心不遍身體謂此心若不遍汝體頭足有知不知處方稱不遍今汝觸頭觸足知覺一般云何不遍云不然者謂頭足皆有知故如上非一非多非遍非不遍者信知此心元無有體是故應知隨所合處心則隨有無有是處這一節經世尊結上隨合之處不成也阿難白佛言世尊至復內無見當在中間這一節經阿難因聞隨合之破又引佛言而轉計也阿難下引佛言證文殊譯語見前法王子者法王是佛佛為諸法之王於法得自在故菩薩為法王之子大菩薩之通稱也等者該乎衆也談實相者實相指諸法寂滅之相名實相也凡有相者非真以無相為相乃名實相方等般若二時常談實相阿難得與聞故如我下正轉計也內無所見等是重述前訛而出計中的所以謂心在中間故能外相知而內無見也佛言汝言中間中必不迷至表體既混心應雜亂這一節經世尊第六徵破計中的所在也佛言下徵其中位乃立二處為破佛謂汝所言中必有定處不迷言有定處也在處在身者佛所立也在身又約中邊破邊則非中中則同內則在身推中中無位矣處者指身外處所在處又約表無表破表者插竿以表為中也若無表則同無中若有表表不可定何以下徵釋不可定的所以如人插竿表中東看表在西南觀表在北四方失準中無定位然而表中者顯汝心之所依也今表體既混心應雜亂中位既無心隨淪沒矣阿難言我所説中非此二種至識生其中則為心在這一節經阿難辨所計中非身非處乃引佛言以定中位也昔世尊在二乘教中曾説根塵為緣生識之語阿難據此謬計為中殊不知是心無體根塵亦妄能生所生俱不可得中何為實故佛下以兼不兼破之眼有分別色塵無知二句分別是有知此是阿難妄計眼有知色無知以知不知為生識之緣以定中位確乎眼亦無知前文佛曾破云汝在室中門能見否當從佛意為然佛言汝心若在根塵之中至即無體性中何為相這一節經佛約兼不兼以破中位無實也佛言下總標二意若兼下先破兼二無中也物體雜亂下物指根塵體指心體上句云此之心體物體之體確頂上句心體説佛意謂物是無知心體是有知然則知與不知雜亂成敵兩立云何為中必要三法方許有中今兩立缺一則無中矣兼二不成下次破不兼二亦無中也兼二不成句語倒應云若不兼二今云不兼根塵二者此心無體如虗空一般非知非不知虗空那裏有知不知的意思此心亦然是故知與不知兩非其相離了根塵心無體性中何為相則不兼二亦無中也二處推中中不可得心之所在又亡矣是故應知當在中間無有是處這一節經世尊結上中心所在不成也阿難白佛言世尊至則我無著名為心不這一節經阿難因聞破中之語又轉計也佛與四弟子共轉法輪者此指般若會上佛令四尊者轉教菩薩如法華信解品中説那時世尊亦説心不在內外中間俱無定所意明心無實體也一切無著名之為心二句是阿難謬解佛語佛必不説無著為心若指無著為心早是著了故不可執無著為心也然稱無著者謂心隨境現觸處洞然無所繫著名無著也於此不善會心則有無窮之過下文破處可見也佛告阿難汝言覺知分別至相有則在云何無著這一節經世尊第七徵破無著心之所在也佛語阿難言汝執能覺能分別的心性俱無在者此牒其所執也無在即是無著言一切者如今世間上自虗空下自水陸飛者是禽行者是人獸等諸所物象總指萬象森羅乃名一切汝稱不著者這一切物象為在為無若是無則則同於龜毛兔角但有空名何勞你去不著若有不著之心在不可名無所云無者無相可著方名為無若説非無非無即有相了有相即在在即是著云何而言無著是故應知一切無著名覺知心無有是處這一節經世尊結上無著為心不成矣以上世尊七處徵心所在已竟須記徵心前云若不識知心目所在則不能得降伏塵勞又云唯心與目今何所在是故七徵但破其所在所在既破賊無逃避下破能推之心正擒賊耳然上徵心所在不至於八亦不停六恰止七者何耶長水疏云凡情所計雖復萬差因依之處不過此七欲推妄體先破所依其猶城陷則賊亡巢傾則卵覆此知言也爾時阿難在大衆中至傾渴翹佇欽聞示誨這一節經阿難因聞七番徵破妄體無依真源未達故重避席虔請奢摩他路也偏袒膝地者如儒禮記云君再拜稽首肉袒親割敬之至也又云肉袒服之盡也彼文雖無膝地之言今亦是拜服之儀示卑下之誠也皆言右者古以右為順以左為逆故稱左遷左道皆是逆意故用右也合掌者是竺乾歸敬之禮取束斂身心之意爾時至白佛言是集家語述阿難請法之儀我是下是阿難自敘猶恃憍憐等者阿難却敘俗情有感而發也最小弟者阿難於八王子昆季行中年最小故蒙佛下敘佛度令出家之情愛也憍憐指佛説憍亦憐意謂佛慈愛憐其幼小今雖出家猶恃慈愛所以久耽多聞未得無漏故不能折伏惡呪為彼所轉溺於淫舍當由下一句阿難復出逐妄所以真際者是常住真心之實際也詣是行義不知是迷義阿難自謂我初溺淫之事何咎所致當由迷彼真造故逐妄趣背覺合塵故招難如此今求返妄歸真之詣故請奢摩他路也惟願下正求真詣良以奢摩等三義為常住真心之路今但舉奢摩者次第以奢摩為始故問前解云從七徵初起即是奢摩今文何故才請其路耶答前文七徵雖云奢摩猶是奢摩之前方便良以七番徵破但破心之所在如臨岐闢路相似後破能推方入正路發軔在此是故方請其路也闡提是略梵語具云一闡提涅槃經云一闡名信提名不具信不具者是譯語指斷善根人説隳彌戾車者隳毀也梵語彌戾車譯云惡見溺有著空起六十二見俱名惡見阿難請示奢摩令彼著惡見者聞之毀滅其惡得正趣故作是下傾者是傾下其心渴約喻説如焦渴而思甘露也翹是仰舉佇是久立謂如仰而久立若有所待以希示誨也爾時世尊從其面門至皆住本國合掌承聽這一節經佛將勦除心賊展發正趣而示本明先寄意於象也面門光者口眼耳鼻眉間之光同時放也表破六根顯出六湛圓明之意光有種種者謂光非一體具百寶色故光從清淨法身中起非世光可比故如百千箇日和合其光少分相似也上云放光下云動地普佛世界六種震動者謂盡空所有佛界悉震動故六震者謂動踊震起吼擊也搖撼不安曰動璘瓏凹凸曰踊隱隱有聲曰震自下升高曰起砰磕發響曰吼衆形相薄曰擊普動即是等遍各具三相意表六識俱轉十八界悉平也如是下十方塵土者即指上句普佛世界故云如是一時開現者意明迷時則六識封蔽彼此我人殊方異障滯凝不通今悟後六用豁達十方一時開現也佛威合一者若約象説佛以法化威神令彼十方塵剎合而為一若約意説由本覺智力以十八界融成一性耳其世界下指上普佛塵界中所有菩薩因人不轉妄依洞開真聽然皆自性覺因攝視聽於本際復何遷易哉故云各住本國承聽也此經凡放光現相處即是關節由前七徵破心的所在今正要勦賊是三觀初功故先放光次標二本科列既成後破能推文源起伏處不可不知佛告阿難一切衆生至縱經塵劫終不能得這一節經世尊將酬奢摩之請且先明衆生為業種所墮而修之未真也種種顛倒者如首尾相換名顛顛故必倒而諸衆生違真逐妄棄本趣末故稱顛倒然此顛倒有無量名約而言之凡夫具四倒謂以非常計常非樂計樂非我計我非淨計淨二乘亦具四倒謂以常計無常樂計無樂我計無我淨計不淨合前是名凡小八倒世出世間攝無量倒故云種種皆依業種而起業種有三謂惑業苦一切業因苦果皆從此起如無始無明熏習成種種必有果子果相生種見不斷故稱業種也如惡叉聚者是喻西域有惡木一枝三子生必同科名惡叉聚以喻衆生惑業苦三生必同聚也惑是癡惑因惑造業由業感苦相依而起故云同聚此指凡夫不修者説縱彼諸修行人不得其正亦不能得無上菩提乃至下指明修行不得正者之相乃至者超諸人神仙鬼不敘故云乃至即如二乘之人雖云順正不樂勝進但保小果故亦斥為別成別成即非正也諸外道輩三界諸天及彼魔王魔民總是邪因邪果邪業邪報耳梵語魔羅譯云能奪命以其崇邪忌正能作奪命因緣故稱為魔言外道者謂心遊道外不正熏修故稱外道皆由下出彼計邪迷因謂諸行人不識真妄錯亂異趣者皆由不知二種根本不知是迷依此迷因而錯亂修習也二根本者一真一妄下文自明猶如下設喻以明錯修無功之意煮沙喻錯修嘉饌喻妙果妙果即無上菩提經塵劫而不得其饌者沙非飯本故也以喻不知真妄二本依此錯修欲希無上菩提縱經塵劫終不可得云何二種阿難一者至而不自覺枉入諸趣這一節經世尊承前徵釋二本以明遺真趣妄之迷也云何一句是徵一者下是釋釋中先明妄本則汝下指示其相謂此妄本即汝今者用攀緣心為自性者是也者字的指生死根本無始生死依之而有故稱生死根本人皆執此為心故兼衆生説攀緣心者即第六識念念攀緣六塵即以六塵緣影為自性故二者下次明真本則汝下指示其相謂此真本即是無始菩提涅槃元清淨體是也然此真體不在別處即汝今者識精元明能生諸緣而諸衆生認緣失真即所遺者是也識精元明者指第八識為識之精精對粗説前六識粗浮唯第八本識是諸識之精元明是第八識湛然不搖處即元明也長水諸師按起信論覺不覺義解指此元明為真愚按第二經見精明元彼明元者即此元明也合而言之總一識精元明分而言之則為六湛圓明故不必作真諦詳見第十識陰文中又按第十經云此湛不真念念受熏故云能生諸緣此諸緣義指前七識説以認緣失真故云緣所遺者者字的指菩提涅槃元清淨體以前七識為緣者即唯識論依彼緣彼之義外則緣塵內則緣心故稱緣也由諸衆生遺此本明這本明指菩提涅槃説謂人人本有之明人皆遺此本明然雖説遺實未當失終日負之而趍昧者不覺故云雖終日行而不自覺枉自疲苦出入諸趣只這在字謂不當入而入曰枉意謂若悟本明當下成佛何自屈而枉入諸趣耶又菩提涅槃者菩提是本覺涅槃是寂滅二者乃果上智斷二轉依號也菩提譯語見前涅槃具云般涅槃那譯云滅度謂滅二種生死度圓寂彼岸故此元清淨體者正指吾心説元者本也本來無染故曰清淨縱使汩沒塵勞輪轉諸趣此心本然曾無濁穢故稱元清淨體也前文七徵但破心之所在下文破能推者正破此第一根本攀緣心也緣心是第六識粗而易明其文故短第二根本乃決擇識精識精鄰真隱而難顯其文故長向後因心顯見因見顯心疑滯漸消菩提漸顯直至第四卷中請行之前方得圓滿是知二本為理門總科亦不離前文心見二義蓋第一根本破心第二根本破見學者窮經當曉大途阿難汝今欲知奢摩他路至我與大衆同將眼見這一節經世尊正酬奢摩之請重徵心目為止散入寂之本也初汝今下牒前問語今復下重徵心目屈五輪指者屈握拳相也五輪者謂如來五指端文理如輪故語阿難下示拳驗見也佛言汝何下正徵見意阿難答以拳曜心目以所見顯能見也拳稱光明者佛身舉體金光顯映故云昭曜心目佛但問見答又兼心汝將下且先徵見佛謂汝將何物能見我拳阿難答以由眼見也兼大衆説者阿難意謂由眼能見不唯一己舉世皆然也佛告阿難汝今答我至失汝元常故受輪轉這一節經世尊咄破妄心勦其賊主正示奢摩路也前文七徵但破其結寨的所在故云徵心所在今破能推正是殺賊奢摩是止今止其妄心正是其路然此猶為初步耳初佛告下是因見顯心何者前文佛但徵見由阿難答兼心目故今且置見而徵心也故云以何為心當我拳曜然按經次第亦必先破其心何故前既徵破所在賊主未曾勦絶故今先心而後見也阿難言下正答拳曜之心躡前推窮七處即將能推者為今拳曜之心也佛咄言此非汝心阿難積劫多聞抱此功勳多是此心被佛一咄而勦除之何其易哉阿難猶不識他是賊還與稱冤呌屈矍然驚懼謂此非我心當名何等咄是呵聲實含憐意如父憐子之愚咄而告之矍是驚起貌後佛告下佛謂此非汝心蓋是前塵虗妄相想正是六塵緣影浮亂之想惑汝真性盜汝家寶前云譬如國王為賊所侵此正是賊由汝無始至今認賊為子失汝元常元本也常不遷也所謂用諸妄想而失此常住真心是故汩沒生死枉受輪轉阿難白佛言世尊至惟垂大悲開發未悟這一節經阿難因被咄破能推失其妄據之本故驚疑而重請開示也初阿難下三句阿難謂我是世尊寵愛之弟我心愛佛佛令出家此似阿難情識不忘有恃寵愛之意因疑世尊徑庭不近人情是故直斥非心也然此阿難既示同迷順適凡情故作哀矜乞怙之語令彼末世衆生讀此如親炙其事易悟入故我心下敘善也縱令下敘惡也如此極善極惡之行皆由此心所造云何説此非心若此下文顯可知爾時世尊開示阿難至與諸大衆默然自失這一節經世尊詳示生滅之心無體欲令阿難棄生滅而證無生也前文世尊咄破能推非心阿難驚疑謂除此覺知更無所有我乃無心同諸土木是故世尊詳示非心所以也欲令心入無生忍者謂阿難一向固執生滅為心今世尊欲令棄生滅心即於生滅證入無生無生滅對治生滅一廢一立誠藥病之要切耳稱法忍者謂無生法之忍也華嚴八地經云不見少法生不見少法滅無滅無生法體本住湛然常寂默證此理忍可於心名無生法忍忍者是智智體綿綿欲罷而不能者謂之忍也師子座者師子乃獸中之王吼時百獸震驚表如來説法魔外喪膽震裂其處故摩頂義見前解如來常説下正釋阿難無心之疑謂如來尋常説言世出世間一切諸法唯心所現唯心之心指真心説一切因果者凡世出世間善惡諸法有因必有果故世界微塵一句指粗細説粗為大地細為微塵凡諸巨細之物皆因心而成其體此釋上唯心所見之語阿難下亦承上義以明真心必有體故良以阿難認此惺惺者為心一旦被佛咄破離此惺惺而不知寂寂之真體故疑為無心是以佛明凡諸世間所有乃至一草一葉一縷一結皆有體性縱令虗空亦有太虗之名凝然洞達之貌何況妙淨明心而自無體耶性一切心者謂彼世出世間凡一切心心所法皆以此妙淨明心為其本性離此妙心則諸心法無別有性故也若汝下明其執吝妄心亡乎真體乃與決擇使其棄妄歸真故執吝者謂執此妄心慳吝不肯捨故覺觀二字各具一意正是第六識緣慮心的行相瑜伽論云謂於外五塵境上匆遽粗轉名覺匆遽細轉名觀俱屬慧心所法也佛與決擇云若汝執此分別覺觀所了知性必為心者此心即應離彼六塵一切緣慮事業別有一箇能分別的全性在即真汝心如汝下引現事顯妄謂汝即今仰承聽法之心此是因我説法音聲方有你的能分別性這是因動而有縱滅下復舉靜時説謂縱滅了一切見聞覺知六塵現境你內守幽間靜境亦非真體猶為意識中的法塵分別影事只此一動一靜之間元非真體我非下暫縱而復奪之謂我不教你畢竟執為非心汝但於心微細揣摩看若離現前六塵別有一箇能分別的心性在這便是你的心若此能分別性離塵無體斯是前塵分別影事影是六塵緣影事是根塵交接取捨愛憎等却非是心若屬前塵塵非常住是生滅法變滅之時此心隨滅則同龜毛兔角徒得空名安有其實則汝法身同斷滅矣稱法身者即以真心法體為我常住之身若此心斷滅其誰修證無生法忍耶末句結歸初文無生法忍之句然此決擇至為親切而阿難等心猶未開新無獲證故心被非前途黯然點失其守佛告阿難世間一切至雖得多聞不成聖果這一節經世尊警諸行者為生滅心誤聖果難成以結第一根本義也九次第定者天台禪門修鍊中説離諸欲入初禪次第入二禪三禪乃至非有想非無想處定最後入滅受想定又云以無漏鍊有漏必令諸禪定觀調柔不令異念間雜即成阿羅漢是名九次第定今云雖成而不得聖果者正警為異念間雜生死根本未破為他所誤故不成果詳此蓋約通途為言不指已證者説也前標二種根本今破第一生死根本文止於此審前阿難誤認能推而世尊直破非心發明生死根本煥然明矣下文阿難既聞咄破先心失守故重請示發妙心開道眼斯當發起第二根本文也阿難聞已重復悲淚至如人説食終不能飽這一節經阿難聞破先心責躬重請心見實際而且先陳徒恃之情也阿難下至白佛言是集家語自我下方是阿難自敘歷觀前文數處凡阿難自敘必兼俗情這是尊者逗機導俗的意思蓋凡情實爾故作此説以開蒙昧也然恃兄是佛弟仗兄的威力無勞自修將謂佛兄惠與三昧現成作佛世間愚蒙誠有此念不知身心本不相代由此因循唐喪失却本然心體身雖出家心不入道末世學人讀此亦應加勉譬如下設譬重明上意窮子喻失本心乏功德財故如窮子捨父喻違真逃逝喻不入道而馳逐有為畜聞成過今日下明始悟也謂從積劫多聞今日蒙佛慈誨始悟多聞無功若不依聞修證與不聞者等耳又設喻明多聞無功謂如有人廣説八珍之美而無一食充飢終不能飽以況多聞不修如説食等耳世尊我等今者二障所纏至發妙明心開我道眼這一節經阿難正請心眼之實發起辨見之端也前來阿難執心在身中眼在面上一往為佛徵破始知心非其真見不在眼是故於今心眼雙請必求其實者爾又前佛破生死根本則阿難所計緣心已無茲將啓後辨見乃從第二根本中識精元明上辨起經文血脈如此學者當細玩之二障者一煩惱障二所知障煩惱障事即我執也所知障理即法執也一切衆生為此二障所纏縛者良由不知寂常心性故爾蓋阿難一向執著惺惺緣慮為心故受輪轉惺惺對寂寂説若著惺邊則成世諦故今以寂常為請若著寂邊其病均也必以惺寂等持適為妙耳今阿難切救其病故請寂常心也惟願下正陳請義窮露者無財謂窮無覆謂露即流浪之謂也妙明心者妙即是寂明即是照照即惺義此正是寂照不二之心也非偏枯之寂故寂以妙稱即寂之照故照以明稱詳解在第四卷中開道眼者前文妄心雖破妄見猶蔽然以塵眸俗翳障乎無漏故請開道眼而扶塵翳耳是故下文重重辨見直至第二卷末皆辨見義也妄見既破真心自明心見非二法故故以心眼雙請有微意存焉然斯心見二義為談理之媒初則破心見之妄次則融心見之真三則泯心見於性覺自阿難發心見相以至極玄極妙總不離此心見二字學者勿忘其本可也即時如來從胸卍字至旋至阿難及諸大衆這一節經世尊將酬心見之問而且放光以寓其意也前文破能推心亦於面門放光彼表破六根顯六湛之意今於胸前放光蓋表會見歸心之意其光具百寶色者意表見為本覺真智具無量功德也十方塵剎一時周遍者意表本覺智光不動而周無何不在也灌如來頂旋至阿難及大衆者意表果因一契彼我同源因窮果徹俱無上也卍字是佛吉祥萬德三十二相之一本非萬字胸提此象以具萬德即以萬字名之詳出華嚴相好品中晃昱者熌爍之意夫佛心不動動必中理以象擬意古聖之則如法華現瑞文殊默識則知欲説大法今象亦然智者觀之必因象以會心也告阿難言吾今為汝至性淨明心得清淨眼這一節經世尊正酬心眼之義始標其淨且妙也建法幢者有摧邪樹正之意故稱曰幢幢是旗屬大將之赤幟近是也又古訓幡屬幡翻也取回轉之意幢取不傾之意今世尊建大法義能摧偏小之執故取況也下文重重摧破堅執故稱法幢法即幢故不獨阿難亦令十方三世衆生俱獲妙心道眼二義也不可思議曰妙深遠叵測曰微含藏堅固曰密道眼澄湛曰清淨何難汝先答我見光明拳至云何成拳汝將誰見這一節經世尊重躡前事以審其見也前將破能推之心世尊舉拳驗見及心前文先破心矣今將破見故重躡拳事問之乃引先所答語徵其根境之實以啓下文也拳與光明是所見境見是能見根問有三事下文答亦指三實處阿難言由佛全體閻浮檀金至屈握示人故有拳相這一節經阿難答前根境三問確指其實處也世尊全體紫金光聚高出大衆如寶山相似閻浮檀金者梵語閻浮譯云勝金檀是樹名此樹生於南洲北岸由樹多滋滋汁流入海成金其金紫色南洲以此樹為名故稱勝金洲佛身金色如之赩許力切音逸赤焰也指佛身金光多赤𦦨故此答光明實處眼指見之實處五輪下指拳之實處也佛告阿難如來今日至例如來拳事義相類這一節經世尊以拳眼眼例漸引阿難悟見歸心也夫無手則無拳無眼非無見阿難未語誤言相類下文辨處可了唯然是領諾之辭餘可解佛告阿難汝言相類至前塵自暗見何虧損這一節經佛明拳眼不類以顯見性無損也非見全無者以不見明似損一分暗猶可矚故曰非見全無以是下謂猶見暗見所不損但以前塵自暗耳下經云不明自發則諸暗相永不能昏此不假明而自發者乃為見自具足何謂無眼即不成見耶阿難言諸盲眼前唯覩黑暗至二黑校量曾無有異這一節經阿難疑暗非見佛校二黑以顯無異也初阿難下疑暗非見佛告下佛校二黑別不別如是下阿難答以二黑無異阿難若無眼人全見前黑至又則燈觀何關汝事這一節經佛校二黑例示燈眼但顯色而非見也初謂盲人見黑若得眼光則顯諸色名眼見者一句是例辭的過文以眼例燈故謂彼暗中有眼之人亦但見黑若得燈光則顯諸色例上眼見則此應名燈見矣然燈是外物有見即非燈矣又燈自有見與汝何干以例眼是假名亦非見者下文結歸可解也是故當知燈能顯色至如是見性是心非眼這一節經世尊結前燈眼之例而會見歸心也初結見是眼而非燈也次結見從心而非眼也會見歸心義明於此阿難雖復得聞是言至合掌清心佇佛悲誨這一節經阿難與衆雖聞會心之語蓋由客塵覆故而未悟也默然者意知前所辨折實如慈命但玄理未明無能重啓故默冀慈音清心以待也爾時世尊舒兜羅綿至因何開悟今成聖果這一節經佛因阿難未悟乃問陳那客塵顯其悟由以警阿難之誤也兜羅綿見前解網相光者世尊身光具百寶色交光相羅如網故也前文阿難未悟會見歸心之旨乃為客塵所誤是故佛問陳那發明客塵二義警示阿難所誤爾鹿園在波羅奈國過去諸佛皆於此初轉法輪往劫有善惡鹿王各領眷屬五百集此林中國王校獵有感王心因賜為養鹿之園故稱鹿園詳見西域記中阿若多譯云已解憍陳那之名也五比丘者初佛乍離王宮入雪山時父王思念乃命父族三人母族二人訪尋太子作伴修道後於雪山相從半途棄去入於鹿園修外道行佛既成道誓先度此五人因至鹿園三轉法輪陳那先悟故立美名詳見阿含等經今文世尊舒手而問者仍前舉拳未了之緣故舒手以問指衆及一切説者人皆為此誤故特問阿若多者由先悟故謂諸行者遠不得成無上菩提近不得證阿羅漢者皆由客塵煩惱所誤故也客塵是喻譬見思二惑見惑浮動往來不停故喻如客思惑校細品數多故故喻如塵客對主説塵對空説主空不動喻真心也客塵動故名惑惑障真心故為所誤阿難之未悟由此汝等下三句正問悟由又前破緣心謂以生死妄想誤為真實今破妄見謂由客塵煩惱所誤須知二誤字彼此相顧又彼指心説妄想此指見稱煩惱蓋煩惱是惑之總名妄想與煩惱名雖異體實同亦不無粗細之分耳時憍陳那起立白佛至名為塵義佛言如是這一節經陳那答佛問義敘自悟由也憍陳那譯云火器其先是事火外道因以為性自雜長老者自謂年齒長於衆而老亦先人故稱長老其於衆中最先稱解故云獨得解名而所解者客塵二義由此得成阿羅漢果此敘悟由也世尊下先釋客義俶裝者俶猶束也遑是暇旅亭是客舍謂行客食宿事畢則結束裝具趨趲前路不暇安住於旅亭也若實下明主是住義攸是所如是下牒明住不住以結客義也又如下次釋塵義新霽者雨後初晴名為新霽淮南子云日出暘谷今云清暘謂是初出暘谷之日漸升於天光未盛而清涼故曰清暘升天光入下明塵相謂日光入屋隙中乃見微細遊塵上下回旋搖動不停虗空一句明不動義如是下牒明動不動以結塵義以上客塵二義客義辨住不住者約去住説故塵義辨動不動者約動靜説故云住即動靜義是故下文單論動靜也佛言下是佛印燈二義謂分別稱理故今文乃審實陳那客塵二義下文即以現事動不動相詰問阿難顯出他的客塵煩惱來然後責其所誤也然今客塵直在喻邊説無法合文大約秪取動不動義故即時如來於大衆中至誰為無住佛言如是這一節經世尊以手開合審阿難動不動義正明所誤之本也即時下如來以手開合問阿難阿見阿難答以如來寶掌開合此阿難具實答也文顯可知佛告下世尊正審動不動義阿難答云佛手自動非我見性有開合也佛徵誰動誰靜一句隱然有警意存焉警謂物無動靜而動靜者是誰意斥阿難內心動故阿難不悟依舊隨情作解道佛手不住不住即動也而我見性求靜不可得更誰無住無住即動也佛言如是者世尊見他不悟且暫縱許之印其分別動不動義不差故云如是總責其迷後文可見如來於是從輪掌中至誰為搖動佛言如是這一節經世尊次復左右飛光審阿難動不動義自外而內也輪掌即五輪掌手掌飛光至其左右者正要阿難動頭方問佛告下佛問動頭何因阿難亦具實答阿難汝盻下正審動不動義阿難亦答頭動見不動也佛言下亦暫縱許之印其分別動不動義不差故云如是總責其迷亦見下文以上兩節文初文佛手開合是阿難外境以其外境對見驗動不動今文飛光動頭頭是阿難內身又以身根對見驗動不動外境踈內身親從踈至親自外及內審其動不動義要令阿難確實明其動不動者是誰然後責其所誤如是則阿難易解而心服也今阿難雖悟見性不動而認處非真良由誤認緣塵分別之見為不動性夫此緣塵分別實非不動而不知根境寂然動靜由心即此分別全是客塵下文所責意在于此又第二卷中云悟中迷者正指此處誤認者説學者不可忘此源也於是如來普告大衆至輪回是中自取流轉這一節經世尊牒前客塵二義及阿難根境動不動相而總責其為分別心之誤也於是下佛述陳那客塵二義汝觀下述阿難頭動義又汝下述手開合義無卷舒云無動靜也云何下正是總責謂阿難逐境生心客塵起滅而遺失真性也以動為身者指頭動頭即身故以動為境者指手開合是阿難外境故此二句意斥阿難不了自心分別為動而反以動為身境耶從始下正責其為客塵起滅佛意總謂汝執身境動者假令內心不起外境寂然何動靜之有蓋動靜者由心分別故也如六祖云風幡非動是仁者心動此之謂也始指手開合終指頭動皆是生滅心念非客塵煩惱而何遺失下是責其遺真逐妄真性即不生滅今棄不生滅而逐諸生滅非顛倒而何故云顛倒行事性心失真下二句謂汝以迷故性心失乎真體乃認妙心中所現物以為自己逐諸生滅輪回於幻己之中非天與非人與而自取流轉耳物字即第二卷中色心諸緣及心所使皆是妙心所現物是也
