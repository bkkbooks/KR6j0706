front:
  text: 首楞嚴經直解序余幼即有四部之癖自孔孟書外喜讀西土諸經而疑常十三輙乙其處如陶元亮不求甚解而已未幾從慈氏事佛一切屏去益取諸經朝夕讀之解楞嚴者孤山十數家最著而余益不能無疑何以故楞嚴惟般剌密諦一譯而潤色於房相國其文簡奧錯綜其義貫攝照應似非思量分別所能了者而十數家之解終是十數家楞嚴近世詮注紛然兢愽耳食顧支離舛謬引蔓牽藤視如來所說之楞巖豈啻霄淵隔哉吳興莫法師結夏甘露庵往往拈楞嚴妙義示人余問師從何處得來學者欲通楞嚴當作何方便師笑不答授余直解十卷則師所手造者也師為雲棲尊宿大弟子智力行力雙轂並臻梵典精研工於著述楞伽參訂疏講席已傳逃影青山復造此解訓詁次第悉準經文提其綱列其目連其脉理且刊定名賢過不及而以明白徑捷出之掃盡支離舛謬引蔓牽藤之習繙閱一過恍若披雲覩天筆頭光明妙契佛旨不僅作十數家鑽故紙忠臣使余疑團頓破文字般若不可秘藏會里中黑白善男女輩捐貲板行之此勝緣也余慨今天下剞劂日盛經術日衰孔孟等書俱壞亂於俚儒及科舉之學有能刊定名賢明白徑捷成一家言如莫法師其人者子車氏所讚聖人之徒非耶因序楞嚴直解而拭目待焉萬曆歲在己未解夏日香光居士李太沖莫勝甫題首楞嚴經直解序詳夫首楞嚴經者文雖十軸義攝三科曰理曰行曰證葢指吾心之妙義謂之理理融三觀而返率其性謂之行親炙理中境界謂之證全經之本末究竟唯此三義而圓收之矣故我迦文薄伽梵始據阿難發心見相處直究其源則根塵識三俱化為無上菩提更於何處見有真妄來而真妄之名皆成贅語矣故知吾心即空如來藏而空如來藏即吾心之妙具曷甞離乎有而言空哉是故山河大地諸有為相當體即如來藏清淨本然中道諦理是為顯理之明文也次復依中理而真修會圓通於一念發妙耳門六解而一亡三觀融而一心寂餘塵息而種智圓行證二文兩言而盡之矣原夫經義本直而解者自迂此所謂非經之難特傳記難之也安法師善得首楞嚴三昧拈綱摭要深切著明片言而立徹全經恍然置人于三昧中自非具正眼而得妙悟者其孰能若是哉於是學眾請師直解其義安師諾之歷五寒暑而草創始成夫此解者不務名相直剖玄微字字契真言言見諦余於雲棲室中偶見之如獲至寶乞之歸于禦兒溪上諸同道輩聞風而至各捐金而壽諸梓嗟乎今之世法當末運砆鍮亂真而此解者逈異群詮誠閻浮金荊山壁世有識者固不與砆鍮同日而語也茲喜肇端於余而功歸於眾余雖不敏而知大道無文上善罔勣故敢以蕪穢聊述梗槩并紀其歲月云爾時皇明萬曆四十七年歲次己未夏四月佛誕日語溪菩薩戒弟子馬正初薰沐和南書于甘露禪院首楞嚴經直贊并序人生㝢內道其可以不聞乎道而不聞隨汩迷津便成苦海道而能聞觸處逍遙遂入妙嚴樂土矣慨余遍歷塵勞廁身棘道舉足動步罔非有礙因而知慕乎道不啻饑渴之甚何意宿緣徼有天幸得遇仁安大師於甘露禪院首出楞嚴直解示余初讀之茫然載讀之有省三復之欣然會心乃歎曰嚮日下手工夫皆孟浪也今閱是編開我茅塞示我衣珠藉茲寶航將登覺岸脫離苦海之患而隨寓可以自適皆緣我師點化之力也敢忘所自乎受益若我而天下之為我者亦夥矣況有愈于我者與迺知是編為由覺路之星軺燭昏衢之寶炬學者必以是而之焉直登寶所勿滯化城而中道廢也庶不負我師所望云爾因為之贊曰大哉鵾鵬游泳南冥吳興脫頴雲棲續明學博心下守謙道盈四山罔逼六度俯弘駕白牛車秉實相印生死海中為恃為怙剗盡葛藤翻空名數吾知是編彌遠彌度悠悠者流同躋覺路又贊曰不有先覺孰開愚濁不有慈航孰渡迷方是故釋尊降圓光於兜率剖右脇於迦維教興頓漸機攝偏圓潄圓音于妙解詮奧旨于雕談潛通五分淨衍三輪敷弘其道正像迭興當斯末運仁者是膺故我伊婆惟勒惟銘投誠于佛稟法于僧奮勇戒禁罔隃尺寸指示既博涓埃澌盡降伏一心培根淨土袪除四相福空阿堵梨布告成曠劫奚阻宥罪拯諐明心苦鎮國佑民永貽終古乞靈萬彚弗專吾我謹贊時皇明萬曆四十七年歲次己未夏四月佛誕日𭳜水空空居士李雲龍薰沐書于語溪歸寶樓中首楞嚴經直解略敘先定時味將解此經長水以十門分別其指遠而義周初學未易能通也今所不敘特以時味之濫千載未明茲略出所自質諸大方耳昔長水璿師指謂匿王琉璃事非一時耶輸持地記自法華故判此經在法華後涅槃前孤山吳興意同長水溫陵環師指謂法王說法有條不紊初說一乘頓教以立本即華嚴也次說三乘漸教以逗機即阿含方等般若也後說一乘圓教以顯實即法華也楞嚴即般若法華之中今時玅峯覺法師按天台玄文出楞嚴百問往破諸說則長水溫陵諸師似難逃乎照膽鏡矣詳夫百問之意定屬方等而方等收經古有通軌百問不明示者欲人因問討尋自得其緒耳昔神智柏庭二師亦以此經判歸方等良以世尊一代時教通依五時五味收之然此時味之說出自華嚴涅槃二經天台因時立義列為五時曰華嚴曰阿含曰方等曰般若曰法華此五時中方等以彈偏斥小歎大襃圓為義然此經中處處彈訶不亦方等乎而諸師稍見經文前後便批判不定而獨不知此五時之中有通有別通則通其初後別則別在方等互徧之義詳出法華玄文又四明光明玄記云以凡判教有前後分前分有次後分不定後雖不定須攝歸前今經互相指處是後分不定意七徵八辯三科等文是前分有次意收通歸別攝後歸前有例可考諒非臆說當知此經是方等中圓教所攝而人不知徒指前後此何據哉灼然時歸方等味定生酥決判此經必安所自若夫指畫未詳區分未悉幸諸達者浚其流而洪其源可也嗟乎此經來我震旦最𣆶故一家之判無聞千載之訛不已茲者略陳管見明經之士試為評之次明綱要遵古道安法師凡釋經大分分三一序分二正宗三流通今經序與流通可知而其正宗自為五分一理分二行分三證分四結經名五緒餘大略當機由所示理而解由解而行由行而證一經綱要在理行證三而已是故阿難所問有三要焉一者經云阿難自恨一向多聞未全道力殷勤啟請十方如來得成菩提玅奢摩他三摩禪那最初方便竊觀阿難此問具攝理行證三要而世尊從之次第標顯則知一經玄奧竝出於茲約答意邊且立此節為理門初要是以世尊始則逐破七處攀緣然後示其生死涅槃二種根本別業同分二種見妄破四性之無主明二月之隣真然其身心真妄虗實雖已明了而猶迷一切幻化起滅當處即真故復示五陰六入十二處十八界七大性相一切圓融周徧法界則玅奢摩他三摩禪那之理悉酬之矣是以阿難說偈讚願以結前文然而理趣既微人情轉昧以故阿難問力不及而富樓那辯才第一超勝阿難乃執清淨本然之理起諸問難而世尊廣依三種相續之由窮諸玄辯以至離即離非是即非即等者無非展轉發明玅奢摩他等之圓理也二者經云阿難白佛言世尊我今猶如旅泊之人忽蒙天王賜與華屋雖獲大宅要因門入所言天王賜與華屋者喻前所示玅奢摩他等之理也阿難意謂雖聞其理未得修進之門與不聞等故有斯請是故世尊因示發覺初心二決定義其間明五重渾濁辯六根優劣擊鐘驗常綰巾示結陳二十五聖圓通本根選擇耳根為之最初方便乃令一門深入為證理之初心以至安立道場放光宣呪無非發明玅奢摩他等之圓行也三者阿難雖解修行未明證位如人遠涉先詢旅泊故復啟請修證階差始終名目是故經云阿難白佛言世尊如是修證佛三摩地未到涅槃云何名為乾慧之地四十四心至何漸次得修行目詣何方所名入地中云何名為等覺菩薩然而世尊將示覺路先明顛倒除顛倒者淨障道故由除顛倒立三漸次從是漸修安立五十五位菩提路者無非發明玅奢摩他等所證之圓位也如上三要一經大旨至矣盡矣是故後無玄說但文殊請結經名而已後文雖有十習六交精嚴七趣之辭乃阿難為人之心不倦世尊樂說之辯無窮委悉搜揚而滿其請茲欲使人明善惡之相達升沈之由如影隨形理之必然使其不怠耳又法筵將罷聽眾無疑世尊乃復回紫金山再來凭倚深談五陰魔邪徧斥諸緣迷謬此又一經最後深慈圓成始末意恐行人於禪定中未諳其兆預為詳明然此二者亦行證二文中之緒餘耳大率集經者之巧撮此二文附於結經之後意使行證兩間徑而不岐便諸習者簡而易明然後付囑流通而卷終矣夫以如上拈經摭義直示大綱欲令未入文心先明宗要故不敢多岐懸說障他心目但得冷然無滯文義兼通會文歸己達理忘言斯足矣是故無復牽藤引蔓但直解其文而已楞嚴經直解凡例此編緣起蓋由古解雕繡末學泣岐有引張江陵太師四書直解例勸請是編以故編中皆倣其式直截指授當文可了故無牽藤引蔓之習仍其舊名題曰直解此編立意發泄幽秘揭示宗要折衷前人過不及之差庶使經義昭然更無餘蘊覧者勿因直而眇忽之幸矣經文綺互義意錯綜而其前後貫攝照應存乎正眼然或隨波逐浪一往趨前忘其原始縱使波流汗漫不殊秋潦諒夫不日而涸矣編中條議一准經文節目及古解宗程以便講席披閱若夫迂僻舛謬之辭置之勿引論也此經文義源遠流長初心罔窺真際一往猶踈三復可得然能以虗心實腹究之聖道可期最忌胸中柴棘則重玄之門無由而入也此經集義辭情尚簡如五十證道中往往由一言而陞進其位不亦太簡乎自非識見高明恒為輕心所忽請觀華嚴勝鬘等經博約可知矣大抵深於理學者博約俱便無他疑滯凡例終
